<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keyboard Event Monitor</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>⌨️ Keyboard Event Monitor</h1>

<p>Press any key while this page is focused.</p>

<div class="card">

<h2>Current Event</h2>

<p><strong>Key :</strong> <span id="key">-</span></p>

<p><strong>Code :</strong> <span id="code">-</span></p>

<p><strong>Event :</strong> <span id="event">-</span></p>

<p><strong>Time :</strong> <span id="time">-</span></p>

</div>

<div class="card">

<h2>Total Events</h2>

<h1 id="count">0</h1>

</div>

<div class="card">

<h2>Recent Events</h2>

<ul id="history"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
