<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Encryption & Decryption</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🔐 Text Encryption & Decryption</h1>
    <p>Encrypt and decrypt text using AES-256-CBC.</p>

    <div class="card">

        <label for="inputText">Enter Text</label>

        <textarea
            id="inputText"
            rows="6"
            placeholder="Type your text here..."
        ></textarea>

        <div class="buttons">

            <button id="encryptBtn">
                🔒 Encrypt
            </button>

            <button id="decryptBtn">
                🔓 Decrypt
            </button>

            <button id="clearBtn">
                🗑 Clear
            </button>

        </div>

    </div>

    <div class="card">

        <label for="outputText">Output</label>

        <textarea
            id="outputText"
            rows="6"
            readonly
            placeholder="Result will appear here..."
        ></textarea>

        <button id="copyBtn">
            📋 Copy Output
        </button>

    </div>

    <footer>
        AES-256-CBC Encryption Project
    </footer>

</div>

<script src="script.js"></script>

</body>
